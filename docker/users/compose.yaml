services:
  postgres:
    image: postgres:18.0-alpine
    container_name: postgres-users
    hostname: ${POSTGRES_HOSTNAME}
    restart: unless-stopped
    command:
      - "postgres"
      - "-c"
      - "port=${USERS_POSTGRES_PORT}"
    ports:
      - "${USERS_POSTGRES_PORT}:${USERS_POSTGRES_PORT}"
    expose:
      - "${USERS_POSTGRES_PORT}"
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${USERS_POSTGRES_DATABASE}
      - USERS_POSTGRES_URL=${USERS_POSTGRES_URL}
      - PGDATA=/var/lib/postgresql/18/docker/users
      - TZ=${TZ}
    volumes:
      - postgres_data:/var/lib/postgresql/18/docker/users
    networks:
      - pollex-network
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER} -p ${USERS_POSTGRES_PORT}",
        ]
      interval: 5s
      timeout: 5s
      retries: 5
  redis:
    image: redis:7.2-alpine
    container_name: redis-users
    hostname: ${REDIS_HOSTNAME}
    restart: unless-stopped
    ports:
      - "${REDIS_PORT_USERS}:${REDIS_PORT_USERS}"
    expose:
      - "${REDIS_PORT_USERS}"
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    networks:
      - pollex-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
  api:
    image: ${DOCKER_REGISTRY}/users:dev
    pull_policy: never
    container_name: api-users
    hostname: api
    restart: unless-stopped
    build:
      context: ../../
      dockerfile: ./docker/users/dockerfile
    ports:
      - "${USERS_API_PORT}:${USERS_API_PORT}"
    networks:
      - pollex-network
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

networks:
  pollex-network:
    external: true

volumes: 
  postgres_data:
    name: postgres_users_data
  redis_data:
    name: redis_users_data