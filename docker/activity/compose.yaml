services:
    mongo:
        image: mongo:8.0
        container_name: mongo-activity
        hostname: ${MONGO_HOSTNAME}
        restart: unless-stopped
        ports:
            - '${ACTIVITY_MONGO_PORT}:27017'
        expose:
            - '27017'
        environment:
            - MONGO_INITDB_ROOT_USERNAME=${MONGO_USER}
            - MONGO_INITDB_ROOT_PASSWORD=${MONGO_PASSWORD}
        volumes:
            - mongo_data:/data/db
        networks:
            - pollex-network
        healthcheck:
            test: ['CMD', 'mongosh', '--quiet', '--eval', 'db.runCommand({ ping: 1 })']
            interval: 5s
            timeout: 5s
            retries: 5

    api:
        image: ${DOCKER_REGISTRY}/activity:dev
        pull_policy: never
        container_name: api-activity
        hostname: api
        restart: unless-stopped
        build:
            context: ../../
            dockerfile: ./docker/activity/dockerfile
        ports:
            - '${ACTIVITY_API_PORT}:${ACTIVITY_API_PORT}'
        environment:
            - ACTIVITY_MONGODB_URL=mongodb://${MONGO_USER}:${MONGO_PASSWORD}@${MONGO_HOSTNAME}:27017/admin
            - ACTIVITY_API_PORT=${ACTIVITY_API_PORT}
            - NODE_ENV=production
            - TZ=${TZ}
        networks:
            - pollex-network
        depends_on:
            mongo:
                condition: service_healthy

networks:
    pollex-network:
        external: true

volumes:
    mongo_data:
        name: mongo_activity_data
