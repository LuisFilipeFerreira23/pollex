services:
  mongo:
    image: mongo:6.0-focal
    container_name: mongo-docs
    hostname: ${MONGO_HOSTNAME}
    restart: unless-stopped
    ports:
      - "${DOCS_MONGO_PORT}:${DOCS_MONGO_PORT}"
    environment:
      - MONGO_INITDB_ROOT_USERNAME=${MONGO_USER}
      - MONGO_INITDB_ROOT_PASSWORD=${MONGO_PASSWORD}
      - MONGO_INITDB_DATABASE=${DOCS_MONGO_DATABASE}
      - TZ=${TZ}
    volumes:
      - mongo_data_docs:/data/db
    networks:
      - pollex-network
    healthcheck:
      test:
        [
          "CMD",
          "mongosh",
          "-u",
          "${MONGO_USER}",
          "-p",
          "${MONGO_PASSWORD}",
          "--authenticationDatabase",
          "admin",
          "--eval",
          "db.runCommand({ ping: 1 })",
          "--quiet",
        ]
      interval: 5s
      timeout: 2s
      retries: 5
  redis:
    image: redis:7.2-alpine
    container_name: redis-docs
    hostname: ${REDIS_HOSTNAME}
    restart: unless-stopped
    ports:
      - "${REDIS_PORT_DOCS}:${REDIS_PORT_DOCS}"
    expose:
      - "${REDIS_PORT_DOCS}"
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    networks:
      - pollex-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
  api:
    image: ${DOCKER_REGISTRY}/docs:dev
    pull_policy: never
    container_name: api-docs
    hostname: api
    restart: unless-stopped
    build:
      context: ../../
      dockerfile: ./docker/docs/dockerfile
    ports:
      - "${DOCS_API_PORT}:${DOCS_API_PORT}"
    environment:
      - MONGODB_URL=${MONGODB_URL}
      - MONGODB_DB_NAME=${DOCS_MONGO_DATABASE}
      - INTERNAL_USERS_SERVICE_URL=${INTERNAL_USERS_SERVICE_URL}
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - pollex-network

networks:
  pollex-network:
    external: true

volumes: 
  mongo_data_docs:
    name: mongo_docs_data
  redis_data:
    name: redis_docs_data